<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>custom-wysiwyg — vanilla demo</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 720px;
        margin: 2rem auto;
        padding: 0 1rem;
        color: #1a1a1a;
      }
      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        margin-bottom: 8px;
      }
      .toolbar button {
        font: inherit;
        padding: 4px 10px;
        border: 1px solid #ccc;
        border-radius: 6px;
        background: #fff;
        cursor: pointer;
      }
      .toolbar button:hover {
        background: #f0f0f0;
      }
      #editor .cwe-content {
        border: 1px solid #ccc;
        border-radius: 8px;
        padding: 12px 16px;
        min-height: 180px;
        outline: none;
      }
      #editor .cwe-content:focus {
        border-color: #4a7dff;
      }
      .exports {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin-top: 16px;
      }
      .exports pre {
        background: #f6f6f6;
        border-radius: 8px;
        padding: 12px;
        font-size: 12px;
        white-space: pre-wrap;
        word-break: break-word;
        min-height: 120px;
        margin: 4px 0 0;
      }
      .exports h3 {
        margin: 0;
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: #666;
      }
    </style>
  </head>
  <body>
    <h1>custom-wysiwyg</h1>
    <p>Vanilla JS embed — no framework, just the IIFE bundles. Live Markdown and HTML export below.</p>

    <div class="toolbar" id="toolbar">
      <button data-cmd="bold"><b>B</b></button>
      <button data-cmd="italic"><i>I</i></button>
      <button data-cmd="code">&lt;/&gt;</button>
      <button data-cmd="h1">H1</button>
      <button data-cmd="h2">H2</button>
      <button data-cmd="p">¶</button>
      <button data-cmd="left">⇤</button>
      <button data-cmd="center">↔</button>
      <button data-cmd="right">⇥</button>
      <button data-cmd="undo">↩</button>
      <button data-cmd="redo">↪</button>
    </div>
    <div id="editor"></div>

    <div class="exports">
      <div>
        <h3>Markdown</h3>
        <pre id="out-md"></pre>
      </div>
      <div>
        <h3>HTML</h3>
        <pre id="out-html"></pre>
      </div>
    </div>

    <script src="../../packages/core/dist/index.global.js"></script>
    <script src="../../packages/export-markdown/dist/index.global.js"></script>
    <script src="../../packages/export-html/dist/index.global.js"></script>
    <script>
      const { Editor, doc: d, paragraph, heading, text } = CustomWysiwyg
      const { serializeMarkdown } = CustomWysiwygMarkdown
      const { serializeHTML } = CustomWysiwygHTML

      const initial = d(
        heading(1, [text('Hello, editor')]),
        paragraph([text('Type here. Try '), text('bold', [{ type: 'bold' }]), text(' and '), text('italic', [{ type: 'italic' }]), text('.')]),
        paragraph([text('This block is centered.')], { align: 'center' }),
      )

      const outMd = document.getElementById('out-md')
      const outHtml = document.getElementById('out-html')
      function renderExports(docNode) {
        outMd.textContent = serializeMarkdown(docNode)
        outHtml.textContent = serializeHTML(docNode)
      }

      const editor = new Editor(document.getElementById('editor'), {
        doc: initial,
        autofocus: true,
        onChange: (ed) => renderExports(ed.getDoc()),
      })
      renderExports(editor.getDoc())

      document.getElementById('toolbar').addEventListener('mousedown', (e) => {
        // Keep focus (and the selection) inside the editor while clicking buttons.
        e.preventDefault()
        const button = e.target.closest('button')
        if (!button) return
        const cmd = button.dataset.cmd
        const c = editor.commands
        const actions = {
          bold: () => c.toggleBold(),
          italic: () => c.toggleItalic(),
          code: () => c.toggleCode(),
          h1: () => c.setHeading(1),
          h2: () => c.setHeading(2),
          p: () => c.setParagraph(),
          left: () => c.setAlign('left'),
          center: () => c.setAlign('center'),
          right: () => c.setAlign('right'),
          undo: () => editor.undo(),
          redo: () => editor.redo(),
        }
        actions[cmd]?.()
      })
    </script>
  </body>
</html>
